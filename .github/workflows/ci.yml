name: Nomba-BE 

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Code Formatting
        run: pnpm exec prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Run Linter
        run: pnpm run lint

      - name: Generate Prisma Client & Schemas
        run: pnpm run db:generate

      - name: Compile & Build NestJS App
        run: pnpm run build

      - name: Run Unit Tests
        run: pnpm exec jest --passWithNoTests

      - name: Run E2E Tests
        run: pnpm exec jest --config ./test/jest-e2e.json --passWithNoTests
